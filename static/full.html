<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alta — full estimate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="page">
    <nav class="page-nav page-nav--top">
      <a href="/">← Canyon top</a>
    </nav>

    <section class="sign-stage" aria-labelledby="main-sign-label">
      <p id="main-sign-label" class="sr-only">Estimated drive time to Alta</p>

      <div id="road-sign" class="road-sign" data-state="idle">
        <div class="sign-bezel">
          <div class="sign-face">
            <div id="sign-line-1" class="sign-line">HOME TO ALTA</div>
            <div id="sign-line-2" class="sign-line sign-line--hero">— —</div>
            <div id="sign-line-3" class="sign-line sign-line--sub">LOADING</div>
          </div>
        </div>
        <p class="sign-caption">Full trip · cameras &amp; 90-minute check</p>
      </div>

      <div id="forecast-inline" class="forecast-inline hidden" aria-live="polite"></div>

      <div id="udot-sign" class="road-sign road-sign--secondary hidden" aria-label="UDOT canyon travel time">
        <div class="sign-bezel sign-bezel--small">
          <div class="sign-face sign-face--small">
            <div id="udot-line-1" class="sign-line sign-line--sm">LITTLE COTTONWOOD</div>
            <div id="udot-line-2" class="sign-line sign-line--sm sign-line--hero">CANYON TOP</div>
            <div id="udot-line-3" class="sign-line sign-line--sm">— MIN</div>
          </div>
        </div>
      </div>
    </section>

    <section class="controls panel">
      <label for="address">From (home address)</label>
      <div class="address-row">
        <input id="address" type="text" placeholder="100 S Main St, Salt Lake City, UT" autocomplete="street-address" />
        <button id="refresh-btn" type="button" title="Update now">↻</button>
      </div>
      <p id="status" class="status" role="status"></p>

      <details class="options">
        <summary>Options &amp; details</summary>
        <label for="threshold">90-minute threshold</label>
        <input id="threshold" type="number" min="30" max="240" value="90" />
        <label class="checkbox-row">
          <input id="auto-refresh" type="checkbox" checked />
          Auto-refresh every 5 minutes
        </label>
        <div id="breakdown" class="breakdown hidden"></div>
      </details>
    </section>

    <section id="cameras" class="panel cameras-panel hidden">
      <h2>Camera scan</h2>
      <div id="camera-grid" class="camera-grid"></div>
    </section>

    <footer class="footer">
      <p>
        Estimates only —
        <a href="https://cottonwoodcanyons.udot.utah.gov/road-information/" target="_blank" rel="noopener">official UDOT road info</a>
      </p>
    </footer>
  </div>

  <script type="module" src="/static/full.js"></script>
</body>
</html>
